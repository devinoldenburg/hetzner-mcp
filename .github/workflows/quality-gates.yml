name: Quality Gates

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pytest-cov build bandit

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Type check with MyPy
        run: |
          mypy src

      - name: Security scan with Bandit
        run: |
          bandit -r src/hetzner_mcp/ -ll

      - name: Run unit tests
        run: |
          pytest tests/ -v --tb=short

      - name: Generate coverage report
        run: |
          pytest --cov=src/hetzner_mcp --cov-report=xml tests/

      - name: Build package
        run: |
          python -m build --wheel --sdist

      - name: Validate operation coverage
        run: |
          python scripts/verify_operation_coverage.py

      - name: Test imports
        run: |
          python -c "from hetzner_mcp import cli, server, install, uninstall"

  all-python-versions-pass:
    needs: quality-gates
    runs-on: ubuntu-latest
    steps:
      - run: echo "All Python versions passed quality gates"
